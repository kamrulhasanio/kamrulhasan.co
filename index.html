<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamrul Hasan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #2E3440;
      color: #ECEFF4;
    }

    .profile-card {
      width: 80%;
      max-width: 600px;
      padding: 20px;
      border: 1px solid #434C5E;
      text-align: center;
      border-radius: 10px;
      font-size: 18px;
      background-color: #3B4252;
    }

    .profile-pic-container {
      position: relative;
      overflow: hidden;
      border-radius: 50%;
      width: 150px;
      height: 150px;
      margin: 0 auto;
    }

    .profile-pic {
      width: 100%;
      height: auto;
      filter: grayscale(100%);
    }

    .divider {
      margin: 10px 0;
      border-bottom: 1px solid #434C5E;
    }

    .social-icons a {
      margin: 0 10px;
      color: #D8DEE9;
      text-decoration: none;
      font-size: 24px;
      position: relative;
      display: inline-block;
    }

    .social-icons a span {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #434C5E;
      padding: 5px;
      border-radius: 5px;
      font-size: 14px;
    }

    .social-icons a:hover span {
      display: block;
    }
  </style>
<link rel="manifest" href="/manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(registration => {
        console.log('Service Worker registered with scope:', registration.scope);
      })
      .catch(error => {
        console.error('Service Worker registration failed:', error);
      });
  }
</script>

</head>
<body>

  <div class="profile-card">
    <div class="profile-pic-container">
      <img src="kh.jpg" alt="Profile Picture" class="profile-pic">
    </div>
    <h2 style="color: #ECEFF4;">Kamrul Hasan</h2>
    <div class="divider"></div>
    <p>I believe that Islamic government can only be established on the model of 'Khilafah ala Minhajin Nabuwayah'.</p>
    <div class="divider"></div>
    <div class="social-icons">
      <a href="mailto:mail@kamrulhasan.co" target="_blank"><i class="fas fa-envelope"></i><span>Email</span></a>
      <a href="https://t.me/kamrulhasanio" target="_blank"><i class="fab fa-telegram"></i><span>Telegram</span></a>
      <a href="https://fb.com/kamrulhasan.io" target="_blank"><i class="fab fa-facebook"></i><span>Facebook</span></a>
      <a href="https://m.me/kamrulhasan.io" target="_blank"><i class="fab fa-facebook-messenger"></i><span>Messenger</span></a>
      <a href="https://kamrulhasan.co" target="_blank"><i class="fab fa-instagram"></i><span>Instagram</span></a>
      <a href="https://techshojja.xyz" target="_blank"><i class="fas fa-blog"></i><span>Blog</span></a>
      <a href="https://kamrulhasan.co" target="_blank"><i class="fab fa-linkedin"></i><span>LinkedIn</span></a>
      <a href="https://github.com/kamrulhasanio" target="_blank"><i class="fab fa-github"></i><span>GitHub</span></a>
    </div>
  </div>

</body>
</html>
